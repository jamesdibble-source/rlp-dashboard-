<html lang="en"><head>

<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#fcf9f1","surface":"#fcf9f1","surface-low":"#f6f4eb","surface-mid":"#f0eee6","surface-high":"#eae8e0","surface-dim":"#dcdad2","on-surface":"#1b1c17","primary":"#513561","primary-c":"#6a4c7a","secondary":"#486456","tertiary":"#61323a","tertiary-c":"#7c4951"},fontFamily:{"serif":["Playfair Display","serif"],"sans":["Inter","sans-serif"]}}}}</script>
<style>
body{font-family:'Inter',sans-serif;background:#fcf9f1;color:#1b1c17}
.grain{background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.03;pointer-events:none}
.sf::-webkit-scrollbar{width:4px}.sf::-webkit-scrollbar-thumb{background:#dcdad2;border-radius:4px}
.nav-i{transition:all .15s;border-left:2px solid transparent;color:rgba(27,28,23,.55)}
.nav-i.ac{color:#6a4c7a;font-weight:700;border-left-color:#6a4c7a;background:#f6f4eb}
.nav-i:hover:not(.ac){background:#f6f4eb}
.sp{transition:all .2s}.sp:hover{background:#eae8e0}.sp.ac{background:#6a4c7a;color:#fff}
.fi{animation:fi .35s ease}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.bv{transition:height .6s cubic-bezier(.4,0,.2,1)}
.bh{transition:width .8s cubic-bezier(.4,0,.2,1)}
tr.dr:hover td{background:#f6f4eb}
th{cursor:pointer;user-select:none}
.sort-a::after{content:'▲';font-size:7px;margin-left:3px;opacity:.6}
.sort-d::after{content:'▼';font-size:7px;margin-left:3px;opacity:.6}
/* Info tooltip */
.info-wrap{position:relative;display:inline-flex;align-items:center}
.info-btn{cursor:pointer;color:rgba(27,28,23,.25);transition:color .15s;font-size:16px;vertical-align:middle}
.info-btn:hover{color:#6a4c7a}
.info-pop{display:none;position:absolute;left:24px;top:-8px;z-index:50;width:320px;background:#fff;border:1px solid #dcdad2;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.info-wrap:hover .info-pop{display:block}
.info-pop h4{font-size:10px;text-transform:uppercase;letter-spacing:0.15em;font-weight:700;color:#513561;margin-bottom:6px}
.info-pop p{font-size:11px;line-height:1.55;color:#1b1c17;opacity:.7;margin-bottom:6px}
.info-pop .method{font-size:10px;color:#486456;border-top:1px solid #f0eee6;padding-top:6px;margin-top:4px}
/* Mock chart styles */
.mock-line{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mock-area{opacity:.12}
.mock-bar{opacity:.7;transition:opacity .2s}.mock-bar:hover{opacity:1}
.mock-dot{fill:#513561;opacity:.5}
</style>
</head>

<script>
const R=__DATA_INJECT__;
let pg='overview',cState=null,viewMode='both',searchTerm='',sortCol=null,sortDir='desc',scatterSub='',highlightLot=null;
const CL=['#513561','#486456','#61323a','#7c4951','#6a4c7a','#314c3f','#583b68','#8b5e3c','#4a6741','#6b4c3b'];
const CC={Western:'#513561',Northern:'#486456','South Eastern':'#61323a','North East':'#7c4951',Ballarat:'#6a4c7a',Geelong:'#314c3f',Bendigo:'#583b68',Shepparton:'#486456','Murray Bridge':'#7c4951',Gippsland:'#4a6741','Other VIC':'#8b5e3c','Western District':'#6b4c3b','Sunbury-Macedon':'#583b68'};
const pages=[
  {id:'overview',icon:'dashboard',label:'Overview'},
  {id:'pricing',icon:'trending_up',label:'Pricing'},
  {id:'velocity',icon:'speed',label:'Sales Velocity'},
  {id:'corridors',icon:'map',label:'Corridors'},
  {id:'suburb',icon:'location_on',label:'Suburb Profile'},
  {id:'registry',icon:'analytics',label:'Registry'},
  {id:'health',icon:'monitor_heart',label:'Market Health'},
  {id:'compare',icon:'compare_arrows',label:'Compare'}
];

let activeSub=null; // currently selected suburb name (null = show all)

function D(){
  // If a suburb is selected, compute metrics from lot data on the fly
  if(activeSub){return computeSuburbData(activeSub);}
  return cState?R.states[cState]:R.all;
}

function computeSuburbData(subName){
  let lots=filterLots(R.lots||[]).filter(l=>l.suburb===subName);
  if(cState) lots=lots.filter(l=>l.state===cState);
  if(!lots.length) return cState?R.states[cState]:R.all; // fallback
  
  const sold=lots.filter(l=>l.status==='sold');
  const listing=lots.filter(l=>l.status!=='sold');
  
  const med=arr=>{const s=[...arr].sort((a,b)=>a-b);return s.length?s[Math.floor(s.length/2)]:0;};
  const avg=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):0;
  
  // Current listings for medians; fall back to recent sold if <10
  const sixMoAgo=new Date(Date.now()-180*86400000).toISOString().slice(0,10);
  const twelveAgo=new Date(Date.now()-365*86400000).toISOString().slice(0,10);
  const recentSold=sold.filter(l=>(l.sd||'')>=sixMoAgo);
  const last12=lots.filter(l=>(l.status!=='sold')||(l.sd||'')>=twelveAgo);
  
  let mPrices=listing.map(l=>l.price); if(mPrices.length<10) mPrices=listing.concat(recentSold).map(l=>l.price);
  let mSizes=listing.map(l=>l.lot_size); if(mSizes.length<10) mSizes=listing.concat(recentSold).map(l=>l.lot_size);
  let mRates=listing.map(l=>l.rate).filter(r=>r>0); if(mRates.length<10) mRates=listing.concat(recentSold).map(l=>l.rate).filter(r=>r>0);
  
  const totals={
    total:lots.length, sold:sold.length, listings:listing.length,
    avg_price:avg(last12.map(l=>l.price)), avg_size:avg(last12.map(l=>l.lot_size)), avg_rate:avg(last12.map(l=>l.rate).filter(r=>r>0)),
    med_price:med(mPrices), med_size:med(mSizes), med_rate:Math.round(med(mRates)),
    months_stock:sold.length>0?(listing.length/(sold.length/12)).toFixed(1):'—'
  };
  
  // Price distribution
  const pBands=[{lo:0,hi:150000,b:'<150k'},{lo:150000,hi:200000,b:'150-200k'},{lo:200000,hi:250000,b:'200-250k'},{lo:250000,hi:300000,b:'250-300k'},{lo:300000,hi:350000,b:'300-350k'},{lo:350000,hi:400000,b:'350-400k'},{lo:400000,hi:450000,b:'400-450k'},{lo:450000,hi:500000,b:'450-500k'},{lo:500000,hi:600000,b:'500-600k'},{lo:600000,hi:9e9,b:'600k+'}];
  const priceDist=pBands.map(b=>({bracket:b.b,count:lots.filter(l=>l.price>=b.lo&&l.price<b.hi).length})).filter(d=>d.count>0);
  
  // Size distribution
  const sBands=[{lo:0,hi:200,b:'<200'},{lo:200,hi:250,b:'200-250'},{lo:250,hi:300,b:'250-300'},{lo:300,hi:350,b:'300-350'},{lo:350,hi:400,b:'350-400'},{lo:400,hi:450,b:'400-450'},{lo:450,hi:500,b:'450-500'},{lo:500,hi:550,b:'500-550'},{lo:550,hi:600,b:'550-600'},{lo:600,hi:700,b:'600-700'},{lo:700,hi:800,b:'700-800'},{lo:800,hi:9e9,b:'800+'}];
  const sizeDist=sBands.map(b=>({bracket:b.b,count:lots.filter(l=>l.lot_size>=b.lo&&l.lot_size<b.hi).length})).filter(d=>d.count>0);
  
  // Rate distribution
  const rBands=[{lo:0,hi:200,b:'<200'},{lo:200,hi:400,b:'200-400'},{lo:400,hi:600,b:'400-600'},{lo:600,hi:800,b:'600-800'},{lo:800,hi:1000,b:'800-1k'},{lo:1000,hi:1200,b:'1-1.2k'},{lo:1200,hi:9e9,b:'1.2k+'}];
  const rateDist=rBands.map(b=>({bracket:b.b,count:lots.filter(l=>l.rate>=b.lo&&l.rate<b.hi).length})).filter(d=>d.count>0);
  
  // Corridor info (the suburb's corridor)
  const cor=lots[0]?.corridor||'Unknown';
  const corridors=[{corridor:cor,total:lots.length,avg_price:avg(prices),avg_size:avg(sizes),avg_rate:avg(rates),sold:sold.length,listings:listing.length}];
  
  // Top/bottom rate — just this suburb
  const topRate=[{suburb:subName,corridor:cor,avg_rate:avg(rates),avg_price:avg(prices),count:lots.length}];
  const bottomRate=topRate;
  
  return {totals,corridors,lgas:[],suburbs:[{suburb:subName,lga:'',corridor:cor,state:lots[0]?.state||'',total:lots.length,sold:sold.length,listings:listing.length,avg_price:avg(prices),avg_size:avg(sizes),avg_rate:avg(rates)}],priceDist,sizeDist,rateDist,topRate,bottomRate};
}

function selectSuburb(name){
  activeSub=name||null;
  searchTerm=name?name.toLowerCase():'';
  const inp=document.getElementById('srcIn');
  if(inp)inp.value=name||'';
  renderSubBadge();
  render();
}

function renderSubBadge(){
  let el=document.getElementById('subBadge');
  if(!el){
    const hdr=document.querySelector('header .flex.items-center');
    if(!hdr)return;
    const d=document.createElement('div');d.id='subBadge';d.className='flex items-center';
    hdr.prepend(d);el=d;
  }
  if(activeSub){
    el.innerHTML='<span class="flex items-center gap-1.5 bg-[#6a4c7a] text-white px-3 py-1 rounded-full text-[9px] uppercase tracking-wider font-bold mr-3">'+titleCase(activeSub)+'<span class="cursor-pointer ml-1 opacity-70 hover:opacity-100" onclick="selectSuburb(null)">✕</span></span>';
  } else {
    el.innerHTML='';
  }
}

function fmt(n){return n?'$'+Math.round(n).toLocaleString():'-'}
function fK(n){if(!n)return'-';return n>=1e6?'$'+(n/1e6).toFixed(1)+'m':n>=1e3?'$'+Math.round(n/1e3)+'k':fmt(n)}
function fN(n){return n?n.toLocaleString():'0'}
function pct(a,b){return b?Math.round(a/b*100)+'%':'0%'}

// Info tooltip builder
function info(title,what,method){
  return `<span class="info-wrap"><span class="material-symbols-outlined info-btn">info</span><div class="info-pop"><h4>${title}</h4><p>${what}</p><div class="method"><strong>How it's computed:</strong> ${method}</div></div></span>`;
}

// Mock SVG chart generators
function mockLineChart(w,h,lines,labels){
  // lines = [{data:[0-1 values], color, label}]
  const pad={t:20,b:30,l:5,r:5};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="w-full">`;
  // Grid lines
  for(let i=0;i<=4;i++){
    const y=pad.t+ch*(i/4);
    svg+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#dcdad2" stroke-width="0.5"/>`;
  }
  // Lines
  lines.forEach(ln=>{
    const pts=ln.data.map((v,i)=>{
      const x=pad.l+(i/(ln.data.length-1))*cw;
      const y=pad.t+ch*(1-v);
      return `${x},${y}`;
    });
    svg+=`<polyline points="${pts.join(' ')}" class="mock-line" stroke="${ln.color}"/>`;
    // Area
    svg+=`<polygon points="${pad.l},${pad.t+ch} ${pts.join(' ')} ${w-pad.r},${pad.t+ch}" fill="${ln.color}" class="mock-area"/>`;
  });
  // X labels
  if(labels){
    labels.forEach((l,i)=>{
      const x=pad.l+(i/(labels.length-1))*cw;
      svg+=`<text x="${x}" y="${h-5}" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="8" font-family="Inter">${l}</text>`;
    });
  }
  // Legend
  let lx=pad.l;
  lines.forEach(ln=>{
    svg+=`<rect x="${lx}" y="2" width="10" height="3" fill="${ln.color}" rx="1"/>`;
    svg+=`<text x="${lx+13}" y="7" fill="#1b1c17" opacity=".5" font-size="7" font-family="Inter">${ln.label||''}</text>`;
    lx+=(ln.label||'').length*4+25;
  });
  svg+=`</svg>`;
  return svg;
}

function mockBarChart(w,h,data,color){
  // data=[{label,value}]
  const pad={t:15,b:25,l:5,r:5};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const mx=Math.max(...data.map(d=>d.value));
  const bw=Math.min(cw/data.length-4, 40);
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="w-full">`;
  data.forEach((d,i)=>{
    const x=pad.l+(i/(data.length))*cw+bw*0.3;
    const bh=ch*(d.value/mx);
    const y=pad.t+ch-bh;
    svg+=`<rect x="${x}" y="${y}" width="${bw*0.7}" height="${bh}" fill="${typeof color==='string'?color:CL[i%CL.length]}" class="mock-bar" rx="1"/>`;
    svg+=`<text x="${x+bw*0.35}" y="${h-5}" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="7" font-family="Inter">${d.label}</text>`;
    svg+=`<text x="${x+bw*0.35}" y="${y-3}" text-anchor="middle" fill="#1b1c17" opacity=".4" font-size="7" font-family="Inter" font-weight="600">${d.value}</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

function mockDualAxis(w,h){
  // Price (left) + Lot Size (right) over time — the affordability squeeze chart
  const qs=['Q1 23','Q2 23','Q3 23','Q4 23','Q1 24','Q2 24','Q3 24','Q4 24','Q1 25','Q2 25','Q3 25','Q4 25'];
  const price=[.45,.47,.50,.52,.55,.58,.60,.62,.63,.65,.67,.70]; // rising
  const size= [.70,.68,.65,.63,.60,.57,.55,.52,.50,.48,.46,.44]; // shrinking
  const pad={t:25,b:30,l:35,r:35};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="w-full">`;
  // Grid
  for(let i=0;i<=4;i++){const y=pad.t+ch*(i/4);svg+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#dcdad2" stroke-width="0.5"/>`;}
  // Left axis labels (price)
  ['$500k','$425k','$350k','$275k','$200k'].forEach((l,i)=>{
    svg+=`<text x="${pad.l-4}" y="${pad.t+ch*(i/4)+3}" text-anchor="end" fill="#513561" opacity=".5" font-size="7" font-family="Inter">${l}</text>`;
  });
  // Right axis labels (lot size)
  ['650m²','550m²','450m²','350m²','250m²'].forEach((l,i)=>{
    svg+=`<text x="${w-pad.r+4}" y="${pad.t+ch*(i/4)+3}" text-anchor="start" fill="#486456" opacity=".5" font-size="7" font-family="Inter">${l}</text>`;
  });
  // Price line
  const pp=price.map((v,i)=>`${pad.l+(i/(qs.length-1))*cw},${pad.t+ch*(1-v)}`);
  svg+=`<polygon points="${pad.l},${pad.t+ch} ${pp.join(' ')} ${w-pad.r},${pad.t+ch}" fill="#513561" opacity=".08"/>`;
  svg+=`<polyline points="${pp.join(' ')}" fill="none" stroke="#513561" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  // Size line
  const sp=size.map((v,i)=>`${pad.l+(i/(qs.length-1))*cw},${pad.t+ch*(1-v)}`);
  svg+=`<polygon points="${pad.l},${pad.t+ch} ${sp.join(' ')} ${w-pad.r},${pad.t+ch}" fill="#486456" opacity=".08"/>`;
  svg+=`<polyline points="${sp.join(' ')}" fill="none" stroke="#486456" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,3"/>`;
  // X labels
  qs.forEach((l,i)=>{svg+=`<text x="${pad.l+(i/(qs.length-1))*cw}" y="${h-5}" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="7" font-family="Inter">${l}</text>`;});
  // Legend
  svg+=`<rect x="${pad.l}" y="4" width="12" height="3" fill="#513561" rx="1"/><text x="${pad.l+15}" y="8" fill="#513561" opacity=".6" font-size="8" font-family="Inter" font-weight="600">Median Price</text>`;
  svg+=`<line x1="${pad.l+95}" y1="6" x2="${pad.l+107}" y2="6" stroke="#486456" stroke-width="2" stroke-dasharray="4,2"/><text x="${pad.l+110}" y="8" fill="#486456" opacity=".6" font-size="8" font-family="Inter" font-weight="600">Median Lot Size</text>`;
  // Affordability line
  const aff_y=pad.t+ch*(1-0.55); // ~$350K line
  svg+=`<line x1="${pad.l}" y1="${aff_y}" x2="${w-pad.r}" y2="${aff_y}" stroke="#61323a" stroke-width="1" stroke-dasharray="3,3" opacity=".4"/>`;
  svg+=`<text x="${w-pad.r}" y="${aff_y-4}" text-anchor="end" fill="#61323a" opacity=".5" font-size="7" font-family="Inter">Affordability Ceiling ~$350K</text>`;
  svg+=`</svg>`;
  return svg;
}

function mockScatter(w,h){
  // $/m² vs median price per suburb — relative value
  const pad={t:20,b:30,l:40,r:10};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="w-full">`;
  for(let i=0;i<=4;i++){const y=pad.t+ch*(i/4);svg+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#dcdad2" stroke-width="0.5"/>`;}
  // Random dots grouped by corridor color
  const dots=[
    {x:.2,y:.3,s:12,c:'#513561'},{x:.25,y:.35,s:8,c:'#513561'},{x:.3,y:.28,s:15,c:'#513561'},{x:.22,y:.32,s:6,c:'#513561'},
    {x:.5,y:.5,s:10,c:'#486456'},{x:.55,y:.55,s:14,c:'#486456'},{x:.48,y:.48,s:7,c:'#486456'},{x:.52,y:.52,s:9,c:'#486456'},
    {x:.7,y:.7,s:8,c:'#61323a'},{x:.75,y:.65,s:11,c:'#61323a'},{x:.72,y:.72,s:6,c:'#61323a'},

function mockGauge(w,h,val,label,color){
  const cx=w/2, cy=h*0.6, r=Math.min(w,h)*0.38;
  const startA=-200, endA=20; // 220-degree arc
  const valA=startA+(endA-startA)*val;
  function arc(a){return{x:cx+r*Math.cos(a*Math.PI/180),y:cy+r*Math.sin(a*Math.PI/180)};}
  const s=arc(startA),e=arc(endA),v=arc(valA);
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="w-full">`;
  // Background arc
  svg+=`<path d="M${s.x},${s.y} A${r},${r} 0 1,1 ${e.x},${e.y}" fill="none" stroke="#eae8e0" stroke-width="8" stroke-linecap="round"/>`;
  // Value arc
  const large=valA-startA>180?1:0;
  svg+=`<path d="M${s.x},${s.y} A${r},${r} 0 ${large},1 ${v.x},${v.y}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" opacity=".7"/>`;
  // Needle dot
  svg+=`<circle cx="${v.x}" cy="${v.y}" r="4" fill="${color}"/>`;
  // Label
  svg+=`<text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#1b1c17" font-size="18" font-weight="600" font-family="Inter">${label}</text>`;
  svg+=`</svg>`;
  return svg;
}

function TS(){
  if(activeSub){return computeSuburbTS(activeSub);}
  return cState&&R.stateTS[cState]?R.stateTS[cState]:R.ts;
}
function computeSuburbTS(subName){
  // Build time series from individual lots for this suburb
  const lots=filterLots(R.lots||[]).filter(l=>l.suburb===subName);
  if(cState) lots.filter(l=>l.state===cState);
  const baseTS=cState&&R.stateTS[cState]?R.stateTS[cState]:R.ts;
  const quarters=baseTS.quarters||[];
  
  function toQ(d){if(!d)return null;const y=parseInt(d.slice(0,4)),m=parseInt(d.slice(5,7));if(isNaN(y)||isNaN(m)||y<2020)return null;return y+'-Q'+Math.ceil(m/3);}
  function med(arr){if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b);return s[Math.floor(s.length/2)];}
  
  const soldByQ={};
  lots.filter(l=>l.status==='sold'&&l.sd).forEach(l=>{
    const q=toQ(l.sd);if(!q)return;
    if(!soldByQ[q])soldByQ[q]={prices:[],sizes:[],rates:[],count:0};
    soldByQ[q].prices.push(l.price);soldByQ[q].sizes.push(l.lot_size);
    if(l.rate>0)soldByQ[q].rates.push(l.rate);soldByQ[q].count++;
  });
  
  const listedByQ={};
  lots.filter(l=>l.ld).forEach(l=>{
    const q=toQ(l.ld);if(!q)return;
    if(!listedByQ[q])listedByQ[q]={prices:[],sizes:[],rates:[],count:0};
    listedByQ[q].prices.push(l.price);listedByQ[q].sizes.push(l.lot_size);
    if(l.rate>0)listedByQ[q].rates.push(l.rate);listedByQ[q].count++;
  });
  
  return {
    quarters,
    sold:quarters.map(q=>{const d=soldByQ[q];return d?{q,count:d.count,medPrice:Math.round(med(d.prices)),medSize:Math.round(med(d.sizes)),medRate:Math.round(med(d.rates)),corridors:{}}:{q,count:0,medPrice:0,medSize:0,medRate:0,corridors:{}};}),
    listed:quarters.map(q=>{const d=listedByQ[q];return d?{q,count:d.count,medPrice:Math.round(med(d.prices)),medSize:Math.round(med(d.sizes)),medRate:Math.round(med(d.rates))}:{q,count:0,medPrice:0,medSize:0,medRate:0};}),
    soldMonthly:baseTS.soldMonthly||[],
    months:baseTS.months||[],
    corridorSeries:{},
    suburbSeries:{}
  };
}
// Real time-series line chart from data
function tsLineChart(w,h,series,labels,yFmt){
  // series = [{data:[numbers], color, label}], labels = quarter strings
  const pad={t:24,b:30,l:55,r:15};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const allVals=series.flatMap(s=>s.data).filter(v=>v>0);
  if(!allVals.length)return '<div class="flex items-center justify-center h-full text-[10px] text-[#1b1c17]/30 uppercase tracking-wider">Time-series data building — check back after daily scrapes</div>';
  const minV=Math.min(...allVals)*0.85,maxV=Math.max(...allVals)*1.1;
  const range=maxV-minV||1;
  let svg='<svg viewBox="0 0 '+w+' '+h+'" class="w-full h-full" preserveAspectRatio="xMidYMid meet">';
  // Grid
  for(let i=0;i<=4;i++){const y=pad.t+ch*(i/4);const v=maxV-range*(i/4);svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(w-pad.r)+'" y2="'+y+'" stroke="#dcdad2" stroke-width="0.5"/>';svg+='<text x="'+(pad.l-6)+'" y="'+(y+3)+'" text-anchor="end" fill="#1b1c17" opacity=".3" font-size="9" font-family="Inter">'+(yFmt?yFmt(v):fK(Math.round(v)))+'</text>';}
  // X labels
  labels.forEach((l,i)=>{const x=pad.l+cw*(i/(labels.length-1||1));svg+='<text x="'+x+'" y="'+(h-6)+'" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="8" font-family="Inter">'+l+'</text>';});
  // Lines
  series.forEach(s=>{
    const pts=s.data.map((v,i)=>{const x=pad.l+cw*(i/(labels.length-1||1));const y=pad.t+ch*(1-(v-minV)/range);return x.toFixed(1)+','+y.toFixed(1);}).filter((_,i)=>s.data[i]>0);
    if(pts.length>1){svg+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>';
    // Area fill
    const first=pts[0].split(',')[0],last=pts[pts.length-1].split(',')[0];
    svg+='<polygon points="'+first+','+(pad.t+ch)+' '+pts.join(' ')+' '+last+','+(pad.t+ch)+'" fill="'+s.color+'" opacity=".06"/>';}
    // Dots
    s.data.forEach((v,i)=>{if(v<=0)return;const x=pad.l+cw*(i/(labels.length-1||1));const y=pad.t+ch*(1-(v-minV)/range);svg+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3" fill="'+s.color+'" opacity=".7"><title>'+s.label+': '+(yFmt?yFmt(v):fK(v))+' ('+labels[i]+')</title></circle>';});
  });
  // Legend
  let lx=pad.l;series.forEach(s=>{svg+='<circle cx="'+lx+'" cy="10" r="4" fill="'+s.color+'" opacity=".7"/><text x="'+(lx+8)+'" y="13" fill="#1b1c17" opacity=".5" font-size="9" font-family="Inter" font-weight="600">'+s.label+'</text>';lx+=s.label.length*6+30;});
  svg+='</svg>';return svg;
}
// Real bar chart from time-series
function tsBarChart(w,h,data,labels,color,yFmt){
  const pad={t:15,b:30,l:50,r:10};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const mx=Math.max(...data,1);
  let svg='<svg viewBox="0 0 '+w+' '+h+'" class="w-full h-full" preserveAspectRatio="xMidYMid meet">';
  for(let i=0;i<=3;i++){const y=pad.t+ch*(i/3);const v=mx-mx*(i/3);svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(w-pad.r)+'" y2="'+y+'" stroke="#dcdad2" stroke-width="0.5"/>';svg+='<text x="'+(pad.l-4)+'" y="'+(y+3)+'" text-anchor="end" fill="#1b1c17" opacity=".25" font-size="8" font-family="Inter">'+(yFmt?yFmt(v):fN(Math.round(v)))+'</text>';}
  const bw=Math.max(cw/data.length*0.65,4);
  data.forEach((v,i)=>{const x=pad.l+cw*((i+0.5)/data.length)-bw/2;const bh=Math.max(v/mx*ch,1);const y=pad.t+ch-bh;svg+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" fill="'+color+'" opacity=".65" rx="1"><title>'+labels[i]+': '+fN(v)+'</title></rect>';svg+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(h-6)+'" text-anchor="middle" fill="#1b1c17" opacity=".25" font-size="7" font-family="Inter">'+labels[i].replace(/^\d{4}-/,'')+'</text>';});
  svg+='</svg>';return svg;
}

  const ps=data.map((d,i)=>{const a=d.total/tot*360;const sa=cum;cum+=a;if(a>=359.9)return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${CC[d.corridor]||CL[i%CL.length]}" opacity=".75"/><circle cx="${cx}" cy="${cy}" r="${ir}" fill="#f6f4eb"/>`;const la=a>180?1:0;const s1=Math.cos((sa-90)*Math.PI/180),c1=Math.sin((sa-90)*Math.PI/180),s2=Math.cos((sa+a-90)*Math.PI/180),c2=Math.sin((sa+a-90)*Math.PI/180);return`<path d="M${cx+ir*s1},${cy+ir*c1} L${cx+r*s1},${cy+r*c1} A${r},${r},0,${la},1,${cx+r*s2},${cy+r*c2} L${cx+ir*s2},${cy+ir*c2} A${ir},${ir},0,${la},0,${cx+ir*s1},${cy+ir*c1} Z" fill="${CC[d.corridor]||CL[i%CL.length]}" opacity=".75"/>`;});
  const leg=data.map((d,i)=>`<div class="flex items-center gap-1.5"><span class="w-1.5 h-1.5" style="background:${CC[d.corridor]||CL[i%CL.length]}"></span><span class="text-[9px] font-semibold text-[#1b1c17]/65">${d.corridor}</span><span class="text-[9px] text-[#1b1c17]/35 ml-0.5">${Math.round(d.total/tot*100)}%</span></div>`).join('');
  return `<div class="flex items-center gap-8"><div class="relative" style="width:${sz}px;height:${sz}px"><svg viewBox="0 0 ${sz} ${sz}">${ps.join('')}</svg><div class="absolute inset-0 flex items-center justify-center"><div class="text-center"><span class="font-sans text-xl font-medium tracking-tight text-[#111]">${fN(tot)}</span><span class="block text-[7px] uppercase tracking-widest text-[#888] mt-0.5">lots</span></div></div></div><div class="space-y-1.5">${leg}</div></div>`;
}

// ──── SCATTER PLOT ────
function renderScatter(){
  const svg=document.getElementById('scatterSvg');
  if(!svg)return;
  const lots=filterLots(R.lots||[]);
  let pts=cState?lots.filter(l=>l.state===cState):lots;
  if(scatterSub)pts=pts.filter(l=>l.suburb===scatterSub);
  
  const pad={t:15,b:25,l:55,r:15};
  const W=1200,H=420;
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  
  // Compute ranges
  const sizes=pts.map(p=>p.lot_size).filter(s=>s>0);
  const prices=pts.map(p=>p.price).filter(p=>p>0);
  if(!sizes.length||!prices.length){svg.innerHTML='<text x="600" y="210" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="14" font-family="Inter">No data</text>';return;}
  
  const minS=Math.min(...sizes)*0.9,maxS=Math.max(...sizes)*1.05;
  const minP=Math.min(...prices)*0.9,maxP=Math.max(...prices)*1.05;
  
  let svgContent='';
  // Grid lines
  for(let i=0;i<=5;i++){
    const y=pad.t+ch*(i/5);
    const p=maxP-(maxP-minP)*(i/5);
    svgContent+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#dcdad2" stroke-width="0.5"/>`;
    svgContent+=`<text x="${pad.l-6}" y="${y+3}" text-anchor="end" fill="#1b1c17" opacity=".3" font-size="9" font-family="Inter">${fK(Math.round(p))}</text>`;
  }
  for(let i=0;i<=6;i++){
    const x=pad.l+cw*(i/6);
    const s=minS+(maxS-minS)*(i/6);
    svgContent+=`<text x="${x}" y="${H-4}" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="9" font-family="Inter">${Math.round(s)}m²</text>`;
  }
  // Axis labels
  svgContent+=`<text x="${W/2}" y="${H-1}" text-anchor="middle" fill="#1b1c17" opacity=".2" font-size="8" font-family="Inter">Lot Size →</text>`;
  
  // Plot dots — sample if too many (max 3000 for performance)
  let plotPts=pts;
  if(plotPts.length>3000){
    const step=Math.ceil(plotPts.length/3000);
    plotPts=plotPts.filter((_,i)=>i%step===0);
  }
  
  plotPts.forEach(lot=>{
    const x=pad.l+((lot.lot_size-minS)/(maxS-minS))*cw;
    const y=pad.t+ch*(1-(lot.price-minP)/(maxP-minP));
    const cor=lot.corridor||'Unknown';
    const col=CC[cor]||CL[0];
    const r=lot.status==='sold'?3.5:3;
    const op=lot.status==='sold'?0.45:0.3;
    svgContent+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${col}" opacity="${op}" stroke="${col}" stroke-width="0.5" stroke-opacity=".3" class="cursor-pointer hover:opacity-100 hover:r-5 transition-opacity" data-id="${lot.id}" onclick="lotClick(${lot.id})"><title>${lot.suburb} · ${fmt(lot.price)} · ${lot.lot_size}m² · ${lot.status}</title></circle>`;
  });
  
  // Count label
  svgContent+=`<text x="${W-pad.r}" y="${pad.t+12}" text-anchor="end" fill="#1b1c17" opacity=".2" font-size="10" font-family="Inter" font-weight="600">${fN(pts.length)} lots plotted</text>`;
  
  svg.innerHTML=svgContent;
}

function lotClick(id){
  highlightLot=id;
  const lot=(R.lots||[]).find(l=>l.id===id);
  if(lot){selectSuburb(lot.suburb);go('suburb');}
}

            <div class="flex items-center h-full gap-1">${(()=>{

          if(!topSubs.length) return '<div class="h-56 flex items-center justify-center text-[10px] text-[#1b1c17]/30">Insufficient data</div>';
          
          // Build rate data by suburb and quarter
          const quarterData={};
          lots.forEach(l=>{

            const q=l.sd?l.sd.slice(0,4)+'-Q'+Math.ceil(parseInt(l.sd.slice(5,7))/3):'';
            if(!q) return;
            if(!quarterData[q]) quarterData[q]={};
            if(!quarterData[q][l.suburb]) quarterData[q][l.suburb]={rates:[],count:0};
            if(l.rate>0) quarterData[q][l.suburb].rates.push(l.rate);
            quarterData[q][l.suburb].count++;
          });
          
          // Compute average rates per suburb per quarter
          const subQuarterRates={};
          const allRates=[];
          Object.keys(quarterData).forEach(q=>{
            Object.keys(quarterData[q]).forEach(sub=>{
              const rates=quarterData[q][sub].rates;
              if(rates.length>0){
                const avgRate=rates.reduce((s,r)=>s+r,0)/rates.length;
                if(!subQuarterRates[sub]) subQuarterRates[sub]={};
                subQuarterRates[sub][q]=avgRate;
                allRates.push(avgRate);
              }
            });
          });
          
          if(!allRates.length) return '<div class="h-56 flex items-center justify-center text-[10px] text-[#1b1c17]/30">Insufficient data</div>';
          
          const minRate=Math.min(...allRates);
          const maxRate=Math.max(...allRates);
          const rateRange=maxRate-minRate||1;
          
          const w=600,h=240;
          const quarters=ts.quarters.slice(-8); // Last 8 quarters
          const pad={t:15,b:5,l:80,r:5};

          topSubs.forEach((sub,ri)=>{

            quarters.forEach((q,qi)=>{
              const rate=subQuarterRates[sub]&&subQuarterRates[sub][q]?subQuarterRates[sub][q]:0;
              const intensity=rate>0?(rate-minRate)/rateRange:0;
              const r=81+Math.round(intensity*129); // 81 to 210
              const g=50+Math.round((1-intensity)*99); // 149 to 50
              const b=97+Math.round((1-intensity)*103); // 200 to 97
              const color='rgba('+r+','+g+','+b+','+(0.3+intensity*0.5)+')';
              svg+='<rect x="'+(pad.l+qi*cw+1)+'" y="'+(pad.t+ri*rh+1)+'" width="'+(cw-2)+'" height="'+(rh-2)+'" fill="'+color+'" rx="2"><title>'+sub+' '+q+': $'+Math.round(rate)+'/m²</title></rect>';
            });
          });
          
          quarters.forEach((q,qi)=>{
            svg+='<text x="'+(pad.l+qi*cw+cw/2)+'" y="'+(pad.t-4)+'" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="7" font-family="Inter">'+q.replace(/^\d{4}-/,'')+'</text>';
          });
          
          svg+='</svg>';
          return svg;
        })()}</div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-8 mb-10">
      <div class="border border-[#dcdad2] p-8 bg-[#fcf9f1]">
        ${(()=>{
          const stdSizes={VIC:[350,400],QLD:[420,500],SA:[375,450],NSW:[400,450],WA:[375,420],TAS:[450,550],NT:[500,600],ACT:[400,500]};
          const st=cState||'VIC';
          const sz=stdSizes[st]||[400,450];
          return sec('Suburb Price at Standardised Lot Size','What does a '+sz[0]+'m² lot cost in each suburb?',{t:'Standardised Lot Pricing',w:'Shows what the median lot would cost in each suburb if all lots were '+sz[0]+'m² (the typical lot size for '+st+'). Removes lot size as a variable so you can compare suburb value purely on location premium.',m:'Each lot\\\'s price is adjusted using an industry-standard lot size adjustment table. A 600m² lot selling for $400K is normalised to its equivalent at '+sz[0]+'m². The adjustment factors are: 0-10% size diff = -2.24% price, 10-20% = -5.4%, 20-30% = -12.6%, 30-40% = -17.4%, 40-50% = -24.4%.'});
        })()}
        <div class="mt-4 space-y-2">
          ${(()=>{
            const stdSizes={VIC:[350,400],QLD:[420,500],SA:[375,450],NSW:[400,450],WA:[375,420]};
            const st=cState||'VIC';
            const sz=stdSizes[st]||[400,450];
            return d.suburbs.filter(s=>s.avg_rate>0).slice(0,12).map((s,i)=>{
              const p1=Math.round(s.avg_rate*sz[0]);
              const p2=Math.round(s.avg_rate*sz[1]);
              const mx=600000;
              return `<div class="flex items-center gap-2"><div class="w-28 text-right text-[10px] font-medium truncate">${s.suburb}</div><div class="flex-1 flex gap-1"><div class="h-5 bg-[#513561]/25 flex items-center px-2" style="width:${Math.min(p1/mx*100,100)}%"><span class="text-[8px] font-bold text-[#513561]">${fK(p1)}</span></div><div class="h-5 bg-[#486456]/20 flex items-center px-2" style="width:${Math.min(p2/mx*100,100)}%"><span class="text-[8px] font-bold text-[#486456]">${fK(p2)}</span></div></div><div class="flex gap-3 text-[7px] text-[#1b1c17]/40 w-24"><span>${sz[0]}m²</span><span>${sz[1]}m²</span></div></div>`;
            }).join('');
          })()}
        </div>
      </div>
      <div class="border border-[#dcdad2] p-8 bg-[#fcf9f1]">
        ${sec('Relative Value Position','Where suburbs sit vs peers',{t:'Relative Value Position',w:'Scatter plot showing each suburb as a bubble. X-axis = median lot price, Y-axis = $/m² rate, bubble size = number of lots. Suburbs in the bottom-left are affordable; top-right are premium. Spots where $/m² is low but price is high mean bigger lots — potentially good value.',m:'Each suburb is plotted using its median price and median $/m² rate. Bubble size represents lot volume. Colours represent growth corridors. Compare clusters to see which corridors offer better value.'})}
        <div class="h-56">${(()=>{
          const lots=filterLots(R.lots||[]);
          const filteredLots=cState?lots.filter(l=>l.state===cState):lots;
          if(!filteredLots.length) return '<div class="h-56 flex items-center justify-center text-[10px] text-[#1b1c17]/30">No data available</div>';
          
          // Group by suburb and compute medians
          const suburbData={};
          filteredLots.forEach(l=>{
            if(!l.suburb||l.price<=0||l.rate<=0) return;
            if(!suburbData[l.suburb]) suburbData[l.suburb]={prices:[],rates:[],count:0,corridor:l.corridor||'Unknown'};
            suburbData[l.suburb].prices.push(l.price);
            suburbData[l.suburb].rates.push(l.rate);
            suburbData[l.suburb].count++;
          });
          
          // Filter suburbs with >=3 lots and compute medians
          const suburbs=Object.entries(suburbData).filter(([_,data])=>data.count>=3).map(([suburb,data])=>{
            const sortedPrices=data.prices.sort((a,b)=>a-b);
            const sortedRates=data.rates.sort((a,b)=>a-b);
            return {
              suburb,
              medPrice:sortedPrices[Math.floor(sortedPrices.length/2)],
              medRate:sortedRates[Math.floor(sortedRates.length/2)],
              count:data.count,
              corridor:data.corridor
            };
          });
          
          if(!suburbs.length) return '<div class="h-56 flex items-center justify-center text-[10px] text-[#1b1c17]/30">Insufficient data (min 3 lots per suburb)</div>';
          
          const w=600,h=240;
          const pad={t:20,b:30,l:40,r:10};
          const cw=w-pad.l-pad.r;
          const ch=h-pad.t-pad.b;
          
          const minPrice=Math.min(...suburbs.map(s=>s.medPrice))*0.9;
          const maxPrice=Math.max(...suburbs.map(s=>s.medPrice))*1.05;
          const minRate=Math.min(...suburbs.map(s=>s.medRate))*0.9;
          const maxRate=Math.max(...suburbs.map(s=>s.medRate))*1.05;
          const maxCount=Math.max(...suburbs.map(s=>s.count));
          
          let svg='<svg viewBox="0 0 '+w+' '+h+'" class="w-full">';
          
          // Grid lines
          for(let i=0;i<=4;i++){
            const y=pad.t+ch*(i/4);
            const rate=maxRate-(maxRate-minRate)*(i/4);
            svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(w-pad.r)+'" y2="'+y+'" stroke="#dcdad2" stroke-width="0.5"/>';
            svg+='<text x="'+(pad.l-4)+'" y="'+(y+3)+'" text-anchor="end" fill="#1b1c17" opacity=".3" font-size="7" font-family="Inter">$'+Math.round(rate)+'</text>';
          }
          
          // Axis labels
          svg+='<text x="'+(pad.l)+'" y="'+(h-5)+'" fill="#1b1c17" opacity=".3" font-size="7" font-family="Inter">'+fK(minPrice)+'</text>';
          svg+='<text x="'+(w-pad.r)+'" y="'+(h-5)+'" text-anchor="end" fill="#1b1c17" opacity=".3" font-size="7" font-family="Inter">'+fK(maxPrice)+'</text>';
          svg+='<text x="'+(w/2)+'" y="'+(h-5)+'" text-anchor="middle" fill="#1b1c17" opacity=".25" font-size="7" font-family="Inter">Median Price →</text>';
          svg+='<text x="'+(pad.l-4)+'" y="'+(pad.t+ch/2)+'" text-anchor="end" fill="#1b1c17" opacity=".25" font-size="7" font-family="Inter" transform="rotate(-90,'+(pad.l-12)+','+(pad.t+ch/2)+')">$/m² →</text>';
          
          // Plot suburbs
          suburbs.forEach(s=>{
            const x=pad.l+((s.medPrice-minPrice)/(maxPrice-minPrice))*cw;
            const y=pad.t+(1-(s.medRate-minRate)/(maxRate-minRate))*ch;
            const r=3+Math.sqrt(s.count/maxCount)*8; // Bubble size 3-11
            const color=CC[s.corridor]||CL[0];
            svg+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r.toFixed(1)+'" fill="'+color+'" opacity=".5" stroke="'+color+'" stroke-width="1" stroke-opacity=".7" class="cursor-pointer hover:opacity-100"><title>'+s.suburb+'\\n'+fmt(s.medPrice)+' median price\\n$'+Math.round(s.medRate)+'/m²\\n'+s.count+' lots</title></circle>';
          });
          
          svg+='</svg>';
          return svg;
        })()}</div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-8 mb-10">
      ${panel(sec('Premium Index','Highest $/m² suburbs (min 3 lots)',{t:'Premium Index',w:'The most expensive suburbs by price per square metre. These are the locations commanding the highest land rates — typically established suburbs with strong amenity.',m:'Average $/m² across all lots in each suburb, ranked highest to lowest. Minimum 3 lots required to qualify — prevents single-listing distortion.'})+'<div class="mt-4">'+hBars(d.topRate,'avg_rate',d=>'$'+d.avg_rate)+'</div>')}
      ${panel(sec('Value Index','Lowest $/m² suburbs (min 3 lots)',{t:'Value Index',w:'The cheapest suburbs by price per square metre. Lower $/m² often means larger lots in outer growth areas or regional towns. Can signal opportunity or low demand — context matters.',m:'Same methodology as Premium Index but ranked lowest to highest. Low $/m² in a growing corridor could mean early-stage estate pricing.'})+'<div class="mt-4">'+hBars(d.bottomRate,'avg_rate',d=>'$'+d.avg_rate)+'</div>')}
    </div>
  </div>`;
}

function renderHealth(){
  return `<div class="fi">
    <div class="mb-8">${sec('Market Cycle Intelligence','Automated health indicators derived from price, volume, supply and velocity data',{t:'Market Health Dashboard',w:'Six key indicators that together tell you where a market sits in its cycle. No single metric is reliable alone — the combination of all six gives a holistic market read. These auto-populate as time-series data accumulates from daily scraping.',m:'Each indicator is computed from underlying lot data. DOM from listing-to-sale dates. $/m² momentum from rate-of-change in quarterly median. Lot size trend from median size QoQ. Stock from listings÷monthly sales. Velocity from sold count trends. Cycle position is a composite of all five.'})}</div>
    <div class="grid grid-cols-3 gap-6 mb-10">
      <div class="border border-[#dcdad2] p-6 bg-[#f6f4eb] text-center">
        ${sec('Days on Market','',{t:'DOM Trend',w:'Are lots selling faster or slower than last quarter? Falling DOM is one of the earliest signs of recovery — demand picks up before prices move.',m:'Average days between listing date and sold date, compared QoQ. Green = falling (improving). Red = rising (softening).'})}
        <div class="h-32">${(()=>{
          const lots=filterLots(R.lots||[]).filter(l=>l.status==='sold'&&l.ld&&l.sd);
          if(cState) lots=lots.filter(l=>l.state===cState);
          if(!lots.length) return mockGauge(200,140,0,'N/A','#888');
          
          let totalDays=0,count=0;
          lots.forEach(l=>{
            const listDate=new Date(l.ld);
            const soldDate=new Date(l.sd);
            if(!isNaN(listDate.getTime())&&!isNaN(soldDate.getTime())&&soldDate>listDate){
              totalDays+=(soldDate-listDate)/(1000*60*60*24);
              count++;
            }
          });
          
          if(count<5) return mockGauge(200,140,0,'Insufficient data','#888');
          const avgDays=Math.round(totalDays/count);
          const val=Math.max(0,Math.min(1,1-(avgDays-30)/120)); // 30-150 days range
          const color=val>0.6?'#486456':(val>0.4?'#8b5e3c':'#61323a');
          const trend=val>0.5?'▼ Fast':'▲ Slow';
          return mockGauge(200,140,val,avgDays+' days',color);
        })()}</div>
        <span class="text-[9px] font-semibold">${(()=>{
          const lots=filterLots(R.lots||[]).filter(l=>l.status==='sold'&&l.ld&&l.sd);
          if(cState) lots=lots.filter(l=>l.state===cState);
          if(!lots.length) return '';
          let totalDays=0,count=0;
          lots.forEach(l=>{
            const listDate=new Date(l.ld);
            const soldDate=new Date(l.sd);
            if(!isNaN(listDate.getTime())&&!isNaN(soldDate.getTime())&&soldDate>listDate){
              totalDays+=(soldDate-listDate)/(1000*60*60*24);
              count++;
            }
          });
          if(count<5) return 'Insufficient data';
          const avgDays=Math.round(totalDays/count);
          return avgDays<60?'▼ Fast':avgDays<90?'Steady':'▲ Slow';
        })()}</span>
      </div>
      <div class="border border-[#dcdad2] p-6 bg-[#f6f4eb] text-center">

        <div class="h-32">${(()=>{

          const recent=ts.sold[ts.sold.length-1];

        <span class="text-[9px] font-semibold">${(()=>{
          const ts=TS();
          if(!ts.sold||ts.sold.length<2) return 'Building data...';
          
          const recent=ts.sold[ts.sold.length-1];
          const prior=ts.sold[ts.sold.length-2];
          
          if(!recent||!prior||!recent.medRate||!prior.medRate) return 'Insufficient data';
          
          const change=(recent.medRate-prior.medRate)/prior.medRate;
          
          if(change>0.02) return 'Accelerating';

      </div>
      <div class="border border-[#dcdad2] p-6 bg-[#f6f4eb] text-center">
        ${sec('Lot Size Trend','',{t:'Lot Size Trend',w:'Are developers cutting lot sizes? Shrinking lots signal that prices have hit the affordability ceiling and developers are reducing land area to maintain price points.',m:'Quarter-on-quarter change in median lot size. Negative = lots shrinking. Persistently shrinking lots = market under affordability pressure.'})}
        <div class="h-32">${(()=>{
          const ts=TS();
          if(!ts.sold||ts.sold.length<2) return mockGauge(200,140,0,'N/A','#888');
          
          const recent=ts.sold[ts.sold.length-1];
          const prior=ts.sold[ts.sold.length-2];
          
          if(!recent||!prior||!recent.medSize||!prior.medSize) return mockGauge(200,140,0,'N/A','#888');
          
          const sizeDiff=recent.medSize-prior.medSize;
          const sign=sizeDiff>0?'+':'';
          const val=0.5+(sizeDiff/100); // ±50m² maps to 0-1
          const normalizedVal=Math.max(0,Math.min(1,val));
          
          const color=sizeDiff<-10?'#61323a':(sizeDiff<10?'#8b5e3c':'#486456');
          
          return mockGauge(200,140,normalizedVal,sign+Math.round(sizeDiff)+'m²',color);

        <span class="text-[9px] font-semibold">${(()=>{
          const ts=TS();
          if(!ts.sold||ts.sold.length<2) return 'Building data...';
          
          const recent=ts.sold[ts.sold.length-1];
          const prior=ts.sold[ts.sold.length-2];
          
          if(!recent||!prior||!recent.medSize||!prior.medSize) return 'Insufficient data';
          
          const sizeDiff=recent.medSize-prior.medSize;
          
          if(sizeDiff<-10) return '▼ Shrinking';
          if(sizeDiff>10) return '▲ Growing';
          return 'Stable';
        })()}</span>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-6 mb-10">
      <div class="border border-[#dcdad2] p-6 bg-[#f6f4eb] text-center">
        ${sec('Supply Level','',{t:'Supply Level',w:'How many months of stock are on the market. Under 3 months = tight supply, favours sellers, prices likely rising. 3-6 months = balanced. Over 6 months = oversupplied, favours buyers.',m:'Current active listings ÷ (total sold lots ÷ number of months of data). E.g. 500 listings ÷ (3000 sold ÷ 12 months) = 2.0 months.'})}
        <div class="h-32">${(()=>{
          const d=D();
          if(!d.totals||!d.totals.months_stock||d.totals.months_stock==='—') return mockGauge(200,140,0,'N/A','#888');
          
          const mos=parseFloat(d.totals.months_stock);

          return mockGauge(200,140,val,mos.toFixed(1)+' mo',color);
        })()}</div>
        <span class="text-[9px] font-semibold">${(()=>{
          const d=D();
          if(!d.totals||!d.totals.months_stock||d.totals.months_stock==='—') return 'No data';
          
          const mos=parseFloat(d.totals.months_stock);
          
          if(mos<3) return 'Tight Supply';
          if(mos<6) return 'Balanced';
          return 'Oversupplied';
        })()}</span>
      </div>
      <div class="border border-[#dcdad2] p-6 bg-[#f6f4eb] text-center">
        ${sec('Sales Velocity','',{t:'Sales Velocity',w:'Is the number of lots selling each quarter going up or down? Rising velocity = growing demand. Falling velocity = demand weakening. Combined with price direction, tells you if growth is real or artificial.',m:'Count of sold lots per quarter, compared to prior quarter and prior year. QoQ and YoY percentage change.'})}
        <div class="h-32">${(()=>{
          const ts=TS();
          if(!ts.sold||ts.sold.length<2) return mockGauge(200,140,0,'N/A','#888');
          
          const recent=ts.sold[ts.sold.length-1];
          const prior=ts.sold[ts.sold.length-2];
          
          if(!recent||!prior||!recent.count||!prior.count) return mockGauge(200,140,0,'N/A','#888');
          
          const change=(recent.count-prior.count)/prior.count;
          const pct=Math.round(change*100);
          const val=0.5+(change*2); // -50% to +50% maps to 0-1
          const normalizedVal=Math.max(0,Math.min(1,val));
          
          const color=change>0.1?'#486456':(change>-0.1?'#8b5e3c':'#61323a');
          const sign=pct>0?'+':'';
          
          return mockGauge(200,140,normalizedVal,sign+pct+'%',color);
        })()}</div>
        <span class="text-[9px] font-semibold">${(()=>{
          const ts=TS();
          if(!ts.sold||ts.sold.length<2) return 'Building data...';
          
          const recent=ts.sold[ts.sold.length-1];
          const prior=ts.sold[ts.sold.length-2];
          
          if(!recent||!prior||!recent.count||!prior.count) return 'Insufficient data';
          
          const change=(recent.count-prior.count)/prior.count;
          
          if(change>0.1) return '▲ Accelerating';
          if(change>-0.1) return 'Steady';
          return '▼ Declining';
        })()}</span>
      </div>
      <div class="border border-[#dcdad2] p-6 bg-[#f6f4eb] text-center">
        ${sec('Cycle Position','',{t:'Market Cycle Position',w:'Where this market sits in the property cycle: Rising → Peak → Flattening → Declining → Bottom → Recovering. Combines all five indicators above into a single assessment.',m:'Composite score from DOM trend (20%), $/m² momentum (25%), lot size trend (15%), supply level (20%), sales velocity (20%). Each scored 0-100, weighted, mapped to cycle phase.'})}
        <div class="h-32">${(()=>{
          const ts=TS();
          const d=D();
          if(!ts.sold||ts.sold.length<2) return mockGauge(200,140,0,'Building','#888');
          
          let score=0,factors=0;
          
          // $/m² momentum (25%)
          const recent=ts.sold[ts.sold.length-1];
          const prior=ts.sold[ts.sold.length-2];
          if(recent&&prior&&recent.medRate&&prior.medRate){
            const rateMomentum=(recent.medRate-prior.medRate)/prior.medRate;
            score+=Math.max(0,Math.min(1,0.5+rateMomentum*2.5))*0.25;
            factors++;
          }
          
          // Sales velocity (20%)
          if(recent&&prior&&recent.count&&prior.count){
            const velocityChange=(recent.count-prior.count)/prior.count;
            score+=Math.max(0,Math.min(1,0.5+velocityChange*2))*0.2;
            factors++;
          }
          
          // Supply level (20%) - inverted (low stock = high score)
          if(d.totals&&d.totals.months_stock&&d.totals.months_stock!=='—'){
            const mos=parseFloat(d.totals.months_stock);
            score+=Math.max(0,Math.min(1,1-mos/8))*0.2;
            factors++;
          }
          
          // Lot size trend (15%) - inverted (shrinking = higher score for tightening market)
          if(recent&&prior&&recent.medSize&&prior.medSize){
            const sizeChange=(recent.medSize-prior.medSize)/prior.medSize;
            score+=Math.max(0,Math.min(1,0.5-sizeChange*5))*0.15;
            factors++;
          }
          
          if(factors===0) return mockGauge(200,140,0,'N/A','#888');
          
          // Normalize by actual factors counted
          score=score*4/factors; // Assuming 4 total factors, scale up
          score=Math.max(0,Math.min(1,score));
          
          let phase,color;
          if(score<0.2){phase='Declining';color='#61323a';}
          else if(score<0.4){phase='Bottom';color='#7c4951';}
          else if(score<0.6){phase='Recovering';color='#8b5e3c';}
          else if(score<0.8){phase='Rising';color='#513561';}
          else{phase='Peak';color='#486456';}
          
          return mockGauge(200,140,score,phase,color);
        })()}</div>
        <span class="text-[9px] font-semibold">${(()=>{
          const ts=TS();
          const d=D();
          if(!ts.sold||ts.sold.length<2) return 'Insufficient data';
          
          let score=0,factors=0;
          
          // Calculate same composite score as above
          const recent=ts.sold[ts.sold.length-1];
          const prior=ts.sold[ts.sold.length-2];
          if(recent&&prior&&recent.medRate&&prior.medRate){
            const rateMomentum=(recent.medRate-prior.medRate)/prior.medRate;
            score+=Math.max(0,Math.min(1,0.5+rateMomentum*2.5))*0.25;
            factors++;
          }
          if(recent&&prior&&recent.count&&prior.count){
            const velocityChange=(recent.count-prior.count)/prior.count;
            score+=Math.max(0,Math.min(1,0.5+velocityChange*2))*0.2;
            factors++;
          }
          if(d.totals&&d.totals.months_stock&&d.totals.months_stock!=='—'){
            const mos=parseFloat(d.totals.months_stock);
            score+=Math.max(0,Math.min(1,1-mos/8))*0.2;
            factors++;
          }
          if(recent&&prior&&recent.medSize&&prior.medSize){
            const sizeChange=(recent.medSize-prior.medSize)/prior.medSize;
            score+=Math.max(0,Math.min(1,0.5-sizeChange*5))*0.15;
            factors++;
          }
          
          if(factors===0) return 'Building data...';
          
          score=score*4/factors;
          score=Math.max(0,Math.min(1,score));
          
          if(score<0.2) return 'Market Declining';
          if(score<0.4) return 'Market Bottom';
          if(score<0.6) return 'Early Recovery';
          if(score<0.8) return 'Growth Phase';
          return 'Peak Conditions';
        })()}</span>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-8 mb-10">
      <div class="border border-[#dcdad2] p-8 bg-[#f6f4eb]">
        ${sec('Historical Context','Current prices vs long-term averages',{t:'Historical Context',w:'Shows whether current prices are above or below the long-term average. Markets trading significantly above average may be peaking. Markets below average may be undervalued or recovering.',m:'Current median price and $/m² compared to the average of all available historical data (up to 5 years). Expressed as % above or below the mean.'})}
        <div class="h-44">${(()=>{
          const ts=TS();
          if(!ts.sold||!ts.sold.length) return '<div class="h-44 flex items-center justify-center text-[10px] text-[#1b1c17]/30">Building time-series data...</div>';
          
          const rates=ts.sold.map(q=>q.medRate).filter(r=>r>0);
          if(!rates.length) return '<div class="h-44 flex items-center justify-center text-[10px] text-[#1b1c17]/30">Insufficient rate data</div>';
          
          const longTermAvg=rates.reduce((s,r)=>s+r,0)/rates.length;
          const avgData=ts.quarters.map(_=>longTermAvg);
          
          return tsLineChart(500,180,[
            {data:rates,color:'#513561',label:'Quarterly $/m²'},
            {data:avgData,color:'#8b5e3c',label:'Long-term Avg'}
          ],ts.quarters,v=>'$'+Math.round(v));
        })()}</div>
        <div class="mt-2 text-center"><span class="text-[10px] font-semibold">${(()=>{
          const ts=TS();
          if(!ts.sold||!ts.sold.length) return '';
          
          const rates=ts.sold.map(q=>q.medRate).filter(r=>r>0);
          if(!rates.length) return '';
          
          const longTermAvg=rates.reduce((s,r)=>s+r,0)/rates.length;
          const currentRate=rates[rates.length-1];
          const diff=(currentRate-longTermAvg)/longTermAvg;
          const pct=Math.round(diff*100);
          
          const color=diff>0?'#513561':'#61323a';
          const text=diff>0?pct+'% above':Math.abs(pct)+'% below';
          
          return '<span style="color:'+color+'">Currently '+text+' long-term average</span>';
        })()}</span></div>
      </div>
      <div class="border border-[#dcdad2] p-8 bg-[#f6f4eb]">
        ${sec('Neighbour Comparison','Suburb relative positioning',{t:'Neighbour Comparison',w:'Select a suburb and instantly see how its pricing compares to the 5 closest suburbs. Reveals whether you\'re paying a premium or getting a discount relative to the local market.',m:'The selected suburb\'s median price and $/m² are compared to the 5 suburbs with the closest postcodes (geographic proximity). Difference shown as % premium or discount.'})}
        <div class="mt-4 space-y-2">
          ${(()=>{
            const d=D();
            if(!d.suburbs||!d.suburbs.length) return '<div class="text-[10px] text-[#1b1c17]/30">No suburb data</div>';
            
            // Find top suburb by lot count as target
            const target=d.suburbs.filter(s=>s.total>=3).sort((a,b)=>b.total-a.total)[0];
            if(!target) return '<div class="text-[10px] text-[#1b1c17]/30">Insufficient data</div>';
            
            // Find 5 nearest suburbs by $/m² rate
            const neighbours=d.suburbs.filter(s=>s.suburb!==target.suburb&&s.total>=3&&s.avg_rate>0)
              .sort((a,b)=>Math.abs(a.avg_rate-target.avg_rate)-Math.abs(b.avg_rate-target.avg_rate))
              .slice(0,5);
            
            const maxRate=Math.max(target.avg_rate,...neighbours.map(n=>n.avg_rate));
            
            let rows=[];
            
            // Target suburb
            rows.push('<div class="flex items-center gap-2 border-b border-[#dcdad2] pb-1 mb-2"><div class="w-32 text-right text-[10px] font-bold text-[#513561]">'+target.suburb+'</div><div class="h-5 flex-1 bg-[#eae8e0] overflow-hidden"><div class="h-full bg-[#513561] opacity-60" style="width:'+(target.avg_rate/maxRate*100)+'%"></div></div><div class="w-16 text-right text-[8px] font-bold text-[#513561]">$'+target.avg_rate+'/m²</div></div>');
            
            // Neighbours
            neighbours.forEach((n,i)=>{
              const diff=Math.round((n.avg_rate/target.avg_rate-1)*100);
              const color=diff>0?'#61323a':'#486456';
              const sign=diff>0?'+':'';
              
              rows.push('<div class="flex items-center gap-2"><div class="w-32 text-right text-[10px] font-medium">'+n.suburb+'</div><div class="h-4 flex-1 bg-[#eae8e0] overflow-hidden"><div class="h-full" style="width:'+(n.avg_rate/maxRate*100)+'%;background:'+color+';opacity:.4"></div></div><div class="w-16 text-right text-[8px] font-semibold" style="color:'+color+'">'+sign+diff+'%</div></div>');
            });
            
            return rows.join('');
          })()}
        </div>
      </div>
    </div>
  </div>`;
}

  const mapUrl='https://www.google.com/maps/search/'+encodeURIComponent(titleCase(current.suburb)+', '+(current.state||cState||'VIC')+', Australia');

  return `<div class="fi">

        ${subs.map(s=>'<option value="'+s.suburb.toLowerCase()+'" data-name="'+s.suburb+'"'+(s.suburb===current.suburb?' selected':'')+'>'+titleCase(s.suburb)+' ('+s.total+' lots)</option>').join('')}

      <span class="text-[9px] text-[#1b1c17]/30 uppercase tracking-wider">${current.corridor||''} · ${current.lga||''} · ${current.state||''}</span>
    </div>
    
    <div class="grid grid-cols-5 border-t border-b border-[#dcdad2] py-6 mb-8">
      ${metric('Total Lots',fN(current.total))}
      ${metric('Median Price',fK(medPrice))}
      ${metric('Median $/m²','$'+Math.round(medRate))}
      ${metric('Median Size',Math.round(medSize)+'m²')}
      ${metric('Sold / Listed',fN(current.sold)+' / '+fN(current.listings))}
    </div>
    
    <div class="grid grid-cols-2 gap-8 mb-8">
      <div class="border border-[#dcdad2] p-8 bg-[#f6f4eb]">
        ${sec('Lot Distribution','Price vs size for every lot in '+titleCase(current.suburb),{t:'Suburb Scatter',w:'Every lot in this suburb plotted by size (x) and price (y). Sold lots are solid, listings are hollow. Gives you the full picture of what this suburb looks like.',m:'Individual lot data from Domain and REA scrapes. Each dot = one lot.'})}
        <div class="relative bg-[#fcf9f1] border border-[#dcdad2]" style="height:250px">
          <svg viewBox="0 0 500 250" class="w-full h-full">${(()=>{
            if(!subLots.length) return '<text x="250" y="125" text-anchor="middle" fill="#1b1c17" opacity=".3" font-size="12">No individual lot data</text>';
            const mnS=Math.min(...subLots.map(l=>l.lot_size))*0.9,mxS=Math.max(...subLots.map(l=>l.lot_size))*1.05;
            const mnP=Math.min(...subLots.map(l=>l.price))*0.9,mxP=Math.max(...subLots.map(l=>l.price))*1.05;
            return subLots.map(l=>{
              const x=20+((l.lot_size-mnS)/(mxS-mnS))*460;

        <div class="mt-4 space-y-3">

            return '<div class="flex items-center gap-2"><div class="w-32 text-right text-[10px] font-medium">'+titleCase(n.suburb)+'</div><div class="flex-1 h-4 bg-[#eae8e0] overflow-hidden"><div class="h-full" style="width:'+Math.min(n.avg_rate/current.avg_rate*100,120)+'%;background:'+col+';opacity:.4"></div></div><div class="w-20 text-right text-[10px] font-semibold" style="color:'+col+'">'+(diff>0?'+':'')+diff+'%</div></div>';

        <div class="h-40">${(()=>{const ts=TS();const ss=ts.suburbSeries&&ts.suburbSeries[current.suburb];if(!ss)return '<div class="flex items-center justify-center h-full text-[10px] text-[#1b1c17]/30 uppercase tracking-wider">Building — data populates with daily scrapes</div>';return tsLineChart(450,160,[{data:ss.map(q=>q.medPrice),color:'#513561',label:titleCase(current.suburb)}],ts.quarters);})()}</div>

        <div class="grid grid-cols-2 gap-4">
          <div><span class="text-[8px] uppercase tracking-widest text-[#888] font-bold block mb-2">Price Bands</span>
          ${(()=>{const bands={'<$200k':0,'$200-300k':0,'$300-400k':0,'$400-500k':0,'$500k+':0};subLots.forEach(l=>{if(l.price<200000)bands['<$200k']++;else if(l.price<300000)bands['$200-300k']++;else if(l.price<400000)bands['$300-400k']++;else if(l.price<500000)bands['$400-500k']++;else bands['$500k+']++;});const mx=Math.max(...Object.values(bands),1);return Object.entries(bands).map(([k,v])=>'<div class="flex items-center gap-1 mb-1"><span class="text-[8px] w-16 text-right text-[#1b1c17]/40">'+k+'</span><div class="flex-1 h-3 bg-[#eae8e0]"><div class="h-full bg-[#513561]/50" style="width:'+Math.max(v/mx*100,2)+'%"></div></div><span class="text-[8px] font-semibold text-[#1b1c17]/50 w-6 text-right">'+v+'</span></div>').join('');})()}
          </div>
          <div><span class="text-[8px] uppercase tracking-widest text-[#888] font-bold block mb-2">Size Bands</span>
          ${(()=>{const bands={'<300m²':0,'300-400':0,'400-500':0,'500-600':0,'600m²+':0};subLots.forEach(l=>{if(l.lot_size<300)bands['<300m²']++;else if(l.lot_size<400)bands['300-400']++;else if(l.lot_size<500)bands['400-500']++;else if(l.lot_size<600)bands['500-600']++;else bands['600m²+']++;});const mx=Math.max(...Object.values(bands),1);return Object.entries(bands).map(([k,v])=>'<div class="flex items-center gap-1 mb-1"><span class="text-[8px] w-16 text-right text-[#1b1c17]/40">'+k+'</span><div class="flex-1 h-3 bg-[#eae8e0]"><div class="h-full bg-[#486456]/50" style="width:'+Math.max(v/mx*100,2)+'%"></div></div><span class="text-[8px] font-semibold text-[#1b1c17]/50 w-6 text-right">'+v+'</span></div>').join('');})()}
          </div>
        </div>
      </div>
    </div>
    
    ${subLots.length?`<div class="border border-[#dcdad2] bg-[#fcf9f1] max-h-[400px] overflow-y-auto sf"><table class="w-full"><thead class="sticky top-0 bg-[#fcf9f1] border-b border-[#dcdad2]"><tr><th class="text-left text-[9px] font-bold uppercase tracking-[0.12em] text-[#888] py-2 px-2.5">Address</th><th class="text-right text-[9px] font-bold uppercase tracking-[0.12em] text-[#888] py-2 px-2.5">Price</th><th class="text-right text-[9px] font-bold uppercase tracking-[0.12em] text-[#888] py-2 px-2.5">Size</th><th class="text-right text-[9px] font-bold uppercase tracking-[0.12em] text-[#888] py-2 px-2.5">$/m²</th><th class="text-center text-[9px] font-bold uppercase tracking-[0.12em] text-[#888] py-2 px-2.5">Status</th></tr></thead><tbody>${subLots.map(l=>`<tr class="dr"><td class="py-2 px-2.5 text-[11px] font-medium">${l.address||titleCase(l.suburb)}</td><td class="py-2 px-2.5 text-[11px] text-right">${fmt(l.price)}</td><td class="py-2 px-2.5 text-[11px] text-right">${l.lot_size}m²</td><td class="py-2 px-2.5 text-[11px] text-right font-semibold text-[#513561]">$${Math.round(l.rate)}</td><td class="py-2 px-2.5 text-[10px] text-center"><span class="px-2 py-0.5 text-[8px] uppercase tracking-wider font-bold ${l.status==='sold'?'text-[#486456] bg-[#486456]/10':'text-[#61323a] bg-[#61323a]/10'}">${l.status}</span></td></tr>`).join('')}</tbody></table></div>`:''}
  </div>`;
}

    <div class="grid grid-cols-2 gap-6 mb-8">
      <div class="bg-[#f6f4eb] border border-[#dcdad2] p-4">

          <option value="">Select Left Market</option>
          <optgroup label="States">${sl.map(s=>'<option value="state:'+s+'">'+s+'</option>').join('')}</optgroup>

        </select>
<div id="cmpL_data" class="text-center py-12"><span class="material-symbols-outlined text-4xl text-[#1b1c17]/10 mb-2 block">analytics</span><span class="text-[10px] text-[#1b1c17]/30 uppercase tracking-wider">Select a market above</span></div>
      </div>
      <div class="bg-[#f6f4eb] border border-[#dcdad2] p-4">
        <select id="cmpR" onchange="updateCompare('R')" class="w-full bg-[#fcf9f1] border border-[#dcdad2] text-[10px] uppercase tracking-wider py-2 px-3 font-bold mb-4">
          <option value="">Select Right Market</option>
          <optgroup label="States">${sl.map(s=>'<option value="state:'+s+'">'+s+'</option>').join('')}</optgroup>
          <optgroup label="Corridors">${allCorridors.map(c=>'<option value="cor:'+c+'">'+c+'</option>').join('')}</optgroup>
        </select>
<div id="cmpR_data" class="text-center py-12"><span class="material-symbols-outlined text-4xl text-[#1b1c17]/10 mb-2 block">analytics</span><span class="text-[10px] text-[#1b1c17]/30 uppercase tracking-wider">Select a market above</span></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-8 mb-10">
      <div class="border border-[#dcdad2] p-8 bg-[#f6f4eb]">
        ${sec('Price Convergence','How state medians move over time',{t:'Price Convergence',w:'Tracks whether cheaper markets are catching up to expensive ones. Narrowing gaps = convergence.',m:'Median lot price per state plotted over time from actual sold data.'})}
        <div class="h-48">${(()=>{const series=sl.filter(s=>R.stateTS[s]).map((s,i)=>({data:R.stateTS[s].sold.map(q=>q.medPrice),color:CL[i],label:s}));return tsLineChart(500,200,series,R.ts.quarters);})()}</div>
      </div>
      <div class="border border-[#dcdad2] p-8 bg-[#f6f4eb]">

        <div class="mt-4">${(()=>{const data=sl.filter(s=>R.states[s]).map(s=>({label:s,value:R.states[s].totals.med_rate||0})).sort((a,b)=>a.value-b.value);return tsBarChart(500,180,data.map(d=>d.value),data.map(d=>d.label),'#513561',v=>'$'+Math.round(v));})()}</div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-8">
      <div class="border border-[#dcdad2] p-8 bg-[#f6f4eb]">
        ${sec('Sold Volume by State','Quarterly transaction volume per state',{t:'State Volume',w:'How sales volume trends differ across states.',m:'Sold lots per quarter per state from sold_date data.'})}
        <div class="h-48">${(()=>{const series=sl.filter(s=>R.stateTS[s]).map((s,i)=>({data:R.stateTS[s].sold.map(q=>q.count),color:CL[i],label:s}));return tsLineChart(500,200,series,R.ts.quarters,v=>fN(Math.round(v)));})()}</div>
      </div>
      <div class="border border-[#dcdad2] p-8 bg-[#f6f4eb]">
        ${sec('Supply vs Demand','Months of stock per state',{t:'National Supply',w:'Months of trading stock per market. Under 3 = tight, prices rising. Over 6 = oversupplied.',m:'Current listings ÷ monthly sales rate per state.'})}

          ${sl.filter(s=>R.states[s]).map(s=>{const t=R.states[s].totals;const mos=t.sold>0?(t.listings/(t.sold/12)):0;const col=mos<3?'#486456':(mos<6?'#8b5e3c':'#61323a');const label=mos<3?'Tight':(mos<6?'Balanced':'Oversupplied');return '<div><div class="flex justify-between text-[11px] mb-1"><span class="font-bold">'+s+'</span><span class="font-semibold" style="color:'+col+'">'+mos.toFixed(1)+' mo · '+label+'</span></div><div class="h-3 bg-[#eae8e0] overflow-hidden"><div class="h-full" style="width:'+Math.min(mos/8*100,100)+'%;background:'+col+';opacity:.6"></div></div></div>';}).join('')}

// ──── COMPARE FUNCTION ────
function updateCompare(side) {
  const select = document.getElementById('cmp' + side);
  const dataDiv = document.getElementById('cmp' + side + '_data');
  
  if (!select || !dataDiv) return;
  
  const sel = select.value;
  
  if (!sel) {
    dataDiv.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-4xl text-[#1b1c17]/10 mb-2 block">analytics</span><span class="text-[10px] text-[#1b1c17]/30 uppercase tracking-wider">Select a market above</span></div>';
    return;
  }
  
  const [type, name] = sel.split(':');
  let data;
  
  if (type === 'state' && R.states[name]) {
    data = R.states[name].totals;
  } else if (type === 'cor') {
    const corridor = R.all.corridors.find(c => c.corridor === name);
    if (corridor) {
      data = {
        med_price: corridor.avg_price,
        med_rate: corridor.avg_rate,
        med_size: corridor.avg_size,
        total: corridor.total,
        sold: corridor.sold,
        listings: corridor.listings,
        months_stock: corridor.sold > 0 ? (corridor.listings / (corridor.sold / 12)).toFixed(1) : '—'
      };
    }
  }
  
  if (!data) {
    dataDiv.innerHTML = '<div class="text-center py-12"><span class="text-[10px] text-[#1b1c17]/30">Data not available</span></div>';
    return;
  }
  
  dataDiv.innerHTML = `
    <div class="bg-[#fcf9f1] p-6 border border-[#dcdad2]">
      <div class="text-center mb-4">
        <span class="text-lg font-serif text-[#1b1c17]">${name}</span>
      </div>
      <div class="grid grid-cols-2 gap-4 text-center">
        <div>
          <span class="text-2xl font-medium tracking-tight text-[#111] block">${fK(data.med_price)}</span>
          <span class="text-[8px] uppercase tracking-widest text-[#888]">median price</span>
        </div>
        <div>
          <span class="text-2xl font-medium tracking-tight text-[#111] block">$${data.med_rate}</span>
          <span class="text-[8px] uppercase tracking-widest text-[#888]">$/m²</span>
        </div>
        <div>
          <span class="text-2xl font-medium tracking-tight text-[#111] block">${data.med_size}m²</span>
          <span class="text-[8px] uppercase tracking-widest text-[#888]">median size</span>
        </div>
        <div>
          <span class="text-2xl font-medium tracking-tight text-[#111] block">${fN(data.total)}</span>
          <span class="text-[8px] uppercase tracking-widest text-[#888]">lots tracked</span>
        </div>
        <div>
          <span class="text-2xl font-medium tracking-tight text-[#111] block">${fN(data.sold)}/${fN(data.listings)}</span>
          <span class="text-[8px] uppercase tracking-widest text-[#888]">sold/listed</span>
        </div>
        <div>
          <span class="text-2xl font-medium tracking-tight text-[#111] block">${data.months_stock}</span>
          <span class="text-[8px] uppercase tracking-widest text-[#888]">months stock</span>
        </div>
      </div>
    </div>
  `;
}

// ──── RENDER ────
function render(){
  document.getElementById('upd').textContent='Updated '+new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  const P={overview:renderOverview,pricing:renderPricing,velocity:renderVelocity,corridors:renderCorridors,suburb:renderSuburb,registry:renderRegistry,health:renderHealth,compare:renderCompare};
  document.getElementById('content').innerHTML=P[pg]();
  if(pg==='overview') setTimeout(renderScatter,50);
}

renderPills();render();
</script>
